<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoBooks CA - Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .glass-morphism {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .modal-animate-in {
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 768px) {
            .main-content { padding-bottom: 5rem; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useMemo } = React;
        const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

        // --- CONSTANTS ---
        const ACCOUNTS = [
            { id: '101', name: 'Cash', type: 'Asset' },
            { id: '102', name: 'Bank Account', type: 'Asset' },
            { id: '401', name: 'Sales Revenue', type: 'Revenue' },
            { id: '501', name: 'Operating Expenses', type: 'Expense' }
        ];

        const GST_RATE = 0.18;

        const formatCurrency = (val) => new Intl.NumberFormat('en-IN', {
            style: 'currency',
            currency: 'INR'
        }).format(val || 0);

        // --- COMPONENTS ---
        const SidebarItem = ({ icon: Icon, label, active, onClick }) => (
            <button 
                onClick={onClick}
                className={`flex items-center w-full px-4 py-3 mb-2 rounded-xl transition-all ${
                    active 
                    ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' 
                    : 'text-slate-600 hover:bg-slate-100'
                }`}
            >
                <Icon size={20} className="mr-3" />
                <span className="font-medium">{label}</span>
            </button>
        );

        const StatCard = ({ title, value, icon: Icon, color }) => (
            <div className="glass-morphism p-6 rounded-2xl shadow-sm">
                <div className="flex justify-between items-start mb-4">
                    <div className={`p-3 rounded-lg bg-${color}-50 text-${color}-600`}>
                        <Icon size={24} />
                    </div>
                </div>
                <h3 className="text-slate-500 text-sm font-medium">{title}</h3>
                <p className="text-2xl font-bold text-slate-900 mt-1">{value}</p>
            </div>
        );

        // --- MAIN APP ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('transactions');
            const [sidebarOpen, setSidebarOpen] = useState(false);
            
            // Sample data structure matching your logic
            const [transactions, setTransactions] = useState([
                { id: 'TX-1001', date: '2023-10-01', description: 'Client Payment', type: 'RECEIPT', amount: 50000 },
                { id: 'TX-1002', date: '2023-10-02', description: 'Software Subscription', type: 'EXPENSE', amount: 2500 },
                { id: 'TX-1003', date: '2023-10-03', description: 'Product Sale', type: 'SALE', amount: 15000 }
            ]);

            const renderTransactions = () => (
                <div className="glass-morphism rounded-2xl overflow-hidden shadow-sm">
                    <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-white/50">
                        <h3 className="font-bold text-slate-800">Transaction Ledger</h3>
                    </div>
                    <div className="divide-y divide-slate-100">
                        {transactions.map((tx) => (
                            <div key={tx.id} className="p-4 flex justify-between items-center hover:bg-slate-50 transition-colors">
                                <div>
                                    <p className="font-semibold text-slate-900">{tx.description}</p>
                                    <p className="text-xs text-slate-500">{tx.date} • {tx.type}</p>
                                </div>
                                <div style={{ textAlign: "right", flexShrink: 0 }}>
                                    {/* FIXED SYNTAX ERROR HERE */}
                                    <div style={{
                                        fontSize: 14,
                                        fontFamily: "monospace",
                                        fontWeight: 700,
                                        color: tx.type.startsWith("SALE") || tx.type === "RECEIPT" ? "#22c55e" : "#ef4444"
                                    }}>
                                        {tx.type.startsWith("SALE") || tx.type === "RECEIPT" ? "+" : "-"}{formatCurrency(tx.amount)}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {/* Desktop Sidebar */}
                    <aside className="hidden md:flex flex-col w-64 glass-morphism border-r border-slate-200 h-screen sticky top-0 p-4">
                        <div className="flex items-center gap-3 px-4 mb-10 mt-4">
                            <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">A</div>
                            <span className="text-xl font-black text-slate-800 tracking-tight">AutoBooks</span>
                        </div>
                        <nav className="flex-1">
                            <SidebarItem icon={lucide.LayoutDashboard} label="Dashboard" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
                            <SidebarItem icon={lucide.Receipt} label="Transactions" active={activeTab === 'transactions'} onClick={() => setActiveTab('transactions')} />
                        </nav>
                    </aside>

                    {/* Mobile Header */}
                    <header className="md:hidden glass-morphism sticky top-0 z-50 px-4 py-3 flex justify-between items-center">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">A</div>
                            <span className="font-bold text-slate-800">AutoBooks</span>
                        </div>
                        <button onClick={() => setSidebarOpen(true)} className="p-2 text-slate-600">
                            <lucide.Menu />
                        </button>
                    </header>

                    {/* Main Content */}
                    <main className="flex-1 p-4 md:p-8 main-content">
                        <header className="mb-8">
                            <h1 className="text-2xl md:text-3xl font-black text-slate-900 capitalize">{activeTab}</h1>
                        </header>
                        
                        {activeTab === 'transactions' ? renderTransactions() : (
                            <div className="p-10 text-center text-slate-500 glass-morphism rounded-2xl">
                                Navigate to Transactions to see the fixed syntax in action.
                            </div>
                        )}
                    </main>

                    {/* Mobile Bottom Nav */}
                    <nav className="md:hidden fixed bottom-0 left-0 right-0 glass-morphism border-t border-slate-200 px-6 py-3 flex justify-around items-center z-50">
                        <button onClick={() => setActiveTab('dashboard')} className={`p-2 ${activeTab === 'dashboard' ? 'text-blue-600' : 'text-slate-400'}`}><lucide.LayoutDashboard size={24}/></button>
                        <button onClick={() => setActiveTab('transactions')} className={`p-2 ${activeTab === 'transactions' ? 'text-blue-600' : 'text-slate-400'}`}><lucide.Receipt size={24}/></button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize Lucide Icons
        setTimeout(() => {
            if (window.lucide) window.lucide.createIcons();
        }, 100);
    </script>
</body>
</html>
