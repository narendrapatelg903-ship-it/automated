<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>AutoBooks CA ⚡</title>
 <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden}
    body{background:#080c14;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;font-size:14px}
    ::-webkit-scrollbar{width:3px;height:3px}
    ::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:4px}
    button{cursor:pointer;font-family:inherit;-webkit-appearance:none}
    input,select,textarea{font-family:inherit;-webkit-appearance:none;appearance:none;outline:none}
    .hrow:hover{background:rgba(255,255,255,0.04)!important}
    .icard{transition:all 0.2s;cursor:pointer}
    .icard:active{transform:scale(0.98);opacity:0.85}

    /* ── RESPONSIVE LAYOUT ── */
    .app-shell{display:flex;flex-direction:column;height:100vh;height:100dvh}

    /* Top nav */
    .top-nav{background:#0d1526;border-bottom:1px solid rgba(255,255,255,0.08);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px;flex-shrink:0;position:relative;z-index:100}
    .nav-logo{display:flex;align-items:center;gap:10px}
    .nav-logo-icon{background:linear-gradient(135deg,#f59e0b,#d97706);width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .nav-title{font-size:15px;font-weight:800;color:#fbbf24;letter-spacing:-0.5px}
    .nav-subtitle{font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:1px}
    .nav-actions{display:flex;gap:8px;align-items:center}
    .nav-tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
    .nav-tabs::-webkit-scrollbar{display:none}

    .btn-label-full { display: inline; }
    .btn-label-short { display: none; }

    /* Main area: sidebar + content */
    .main-area{display:flex;flex:1;overflow:hidden}

    /* Sidebar */
    .sidebar{width:220px;border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;flex-shrink:0;transition:transform 0.25s;background:#0a0f1a}
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200}

    /* Content */
    .content{flex:1;overflow-y:auto;padding:16px}

    /* Bottom nav (mobile only) */
    .bottom-nav{display:none;background:#0d1526;border-top:1px solid rgba(255,255,255,0.08);flex-shrink:0}

    /* KPI grid */
    .kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
    .dash-grid{display:grid;grid-template-columns:3fr 2fr;gap:14px}

    /* Integration grid */
    .intg-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px}

    /* Cards */
    .card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px}
    .inp{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:10px 12px;color:#e2e8f0;font-size:14px;width:100%}
    .lbl{font-size:10px;color:#64748b;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.8px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

    /* Table wrapper — horizontal scroll on small screens */
    .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
    table{width:100%;border-collapse:collapse;min-width:600px}

    /* ── TABLET (≤900px) ── */
    @media(max-width:900px){
      .kpi-grid{grid-template-columns:repeat(3,1fr)}
      .dash-grid{grid-template-columns:1fr}
      .intg-grid{grid-template-columns:repeat(2,1fr)}
      .sidebar{width:240px;position:fixed;top:56px;left:0;height:calc(100vh - 56px);height:calc(100dvh - 56px);z-index:300;transform:translateX(-100%)}
      .sidebar.open{transform:translateX(0)}
      .sidebar-overlay.open{display:block}
      .nav-tabs{display:none}
      .bottom-nav{display:flex;justify-content:space-around;padding:4px 0 max(4px, env(safe-area-inset-bottom))}
      #hamburger{display:flex!important}
    }

    /* ── MOBILE (≤600px) ── */
    @media(max-width:600px){
      .top-nav{padding:0 12px;height:52px}
      .nav-title{font-size:14px}
      .nav-subtitle{display:none}
      .nav-logo-icon{width:32px;height:32px;font-size:16px;border-radius:8px}
      .kpi-grid{grid-template-columns:repeat(2,1fr);gap:8px}
      .kpi-grid > *:last-child{grid-column:span 2}
      .dash-grid{grid-template-columns:1fr}
      .intg-grid{grid-template-columns:1fr}
      .content{padding:12px}
      .form-grid{grid-template-columns:1fr}
      .btn-label-full { display: none; }
      .btn-label-short { display: inline; }
      .pos-badge { display: none !important; }
    }

    /* ── LARGE (≥1200px) ── */
    @media(min-width:1200px){
      .kpi-grid{grid-template-columns:repeat(5,1fr)}
      .dash-grid{grid-template-columns:3fr 2fr}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── ACCOUNTING ENGINE ─────────────────────────────────────────────────
const GST = 0.18;
const ACCOUNTS = {
  CASH:       {code:"1001",name:"Cash in Hand",       type:"Asset"},
  BANK:       {code:"1002",name:"Bank Account",       type:"Asset"},
  RECEIVABLE: {code:"1003",name:"Accounts Receivable",type:"Asset"},
  INVENTORY:  {code:"1004",name:"Stock / Inventory",  type:"Asset"},
  PAYABLE:    {code:"2001",name:"Accounts Payable",   type:"Liability"},
  GST_PAY:    {code:"2002",name:"GST Payable",        type:"Liability"},
  GST_INPUT:  {code:"2003",name:"GST Input Credit",   type:"Asset"},
  CAPITAL:    {code:"3001",name:"Owner's Capital",    type:"Equity"},
  SALES:      {code:"4001",name:"Sales Revenue",      type:"Revenue"},
  PURCHASE:   {code:"5001",name:"Purchases",          type:"Expense"},
  SALARY:     {code:"5002",name:"Salary Expense",     type:"Expense"},
  RENT:       {code:"5003",name:"Rent Expense",       type:"Expense"},
  MISC:       {code:"5004",name:"Miscellaneous Exp.", type:"Expense"},
};
const TYPE_LABELS = {
  SALE_CASH:"Sale (Cash)",SALE_CREDIT:"Sale (Credit)",
  PURCHASE_CASH:"Purchase (Cash)",PURCHASE_CREDIT:"Purchase (Credit)",
  EXPENSE:"Expense",RECEIPT:"Receipt",PAYMENT:"Payment"
};
const TYPE_COLORS = {
  SALE_CASH:"#22c55e",SALE_CREDIT:"#86efac",
  PURCHASE_CASH:"#f97316",PURCHASE_CREDIT:"#fdba74",
  EXPENSE:"#f43f5e",RECEIPT:"#3b82f6",PAYMENT:"#a78bfa"
};
const SRC_COLORS = {
  AUTO:"#fbbf24", MANUAL:"#93c5fd", CSV:"#22c55e", TALLY:"#f97316", 
  AI_PARSE:"#a855f7", DEMO:"#64748b", IMPORT:"#34d399"
};

function makeEntries(bill) {
  const amt=bill.amount, gst=parseFloat((amt*GST).toFixed(2)), tot=parseFloat((amt+gst).toFixed(2)), e=[];
  if(bill.type==="SALE_CASH")          {e.push({account:"CASH",dr:tot,cr:0});e.push({account:"SALES",dr:0,cr:amt});e.push({account:"GST_PAY",dr:0,cr:gst});}
  else if(bill.type==="SALE_CREDIT")   {e.push({account:"RECEIVABLE",dr:tot,cr:0});e.push({account:"SALES",dr:0,cr:amt});e.push({account:"GST_PAY",dr:0,cr:gst});}
  else if(bill.type==="PURCHASE_CASH") {e.push({account:"PURCHASE",dr:amt,cr:0});e.push({account:"GST_INPUT",dr:gst,cr:0});e.push({account:"CASH",dr:0,cr:tot});}
  else if(bill.type==="PURCHASE_CREDIT"){e.push({account:"PURCHASE",dr:amt,cr:0});e.push({account:"GST_INPUT",dr:gst,cr:0});e.push({account:"PAYABLE",dr:0,cr:tot});}
  else if(bill.type==="EXPENSE")       {const a=bill.expenseAccount||"MISC";e.push({account:a,dr:amt,cr:0});e.push({account:"CASH",dr:0,cr:amt});}
  else if(bill.type==="RECEIPT")       {e.push({account:"BANK",dr:amt,cr:0});e.push({account:"RECEIVABLE",dr:0,cr:amt});}
  else if(bill.type==="PAYMENT")       {e.push({account:"PAYABLE",dr:amt,cr:0});e.push({account:"BANK",dr:0,cr:amt});}
  return e;
}

let gid=100;
const makeTx=(bill,src)=>({
  id:++gid, date:new Date().toISOString(), billNo:bill.billNo||"TX-"+gid, 
  party:bill.party||"—", type:bill.type, amount:bill.amount, 
  narration:bill.narration, source:src||"MANUAL", expenseAccount:bill.expenseAccount, 
  journalEntries:makeEntries(bill)
});

const computeBal=txs=>{
  const b={}; Object.keys(ACCOUNTS).forEach(k=>b[k]=0);
  txs.forEach(tx=>tx.journalEntries.forEach(e=>{b[e.account]=(b[e.account]||0)+e.dr-e.cr;}));
  return b;
};

const fmt=n=>"₹"+Math.abs(n).toLocaleString("en-IN",{minimumFractionDigits:2});
const fmtD=iso=>new Date(iso).toLocaleDateString("en-IN",{day:"2-digit",month:"short"});

const BILLS = [
  {type:"SALE_CASH",      amount:4500,  narration:"Sale: Mobile Covers + Screen Guards", billNo:"INV-1001", party:"Walk-in Customer"},
  {type:"SALE_CREDIT",    amount:12000, narration:'Sale: Samsung TV 32"',                billNo:"INV-1002", party:"Ramesh Electronics"},
  {type:"PURCHASE_CASH",  amount:25000, narration:"Stock Purchase: Electronics",        billNo:"PUR-501",  party:"Raj Distributors"},
  {type:"SALE_CASH",      amount:2200,  narration:"Sale: Earphones x5 + Cable x3",      billNo:"INV-1003", party:"Walk-in Customer"},
  {type:"EXPENSE",        amount:8000,  narration:"Monthly Shop Rent - March 2025",     billNo:"RENT-03",  party:"Landlord", expenseAccount:"RENT"},
  {type:"PURCHASE_CREDIT",amount:40000, narration:"Stock: Smartphones Batch",           billNo:"PUR-502",  party:"Galaxy Wholesale"},
  {type:"SALE_CASH",      amount:15000, narration:"Sale: iPhone Case + AirPods",        billNo:"INV-1004", party:"Priya Sharma"},
  {type:"RECEIPT",        amount:12000, narration:"Payment from Ramesh Electronics",   billNo:"RCP-201",  party:"Ramesh Electronics"},
  {type:"EXPENSE",        amount:25000, narration:"Staff Salaries - March 2025",        billNo:"SAL-03",   party:"Staff", expenseAccount:"SALARY"},
  {type:"PAYMENT",        amount:40000, narration:"Payment to Galaxy Wholesale",        billNo:"PAY-301",  party:"Galaxy Wholesale"},
];

// ── MODAL ─────────────────────────────────────────────────────────────
function Modal({title,onClose,children}){
  useEffect(()=>{document.body.style.overflow="hidden";return()=>{document.body.style.overflow=""}},[]);
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center",padding:"0"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#0d1526",border:"1px solid rgba(255,255,255,0.12)",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:600,maxHeight:"92vh",overflowY:"auto",padding:"20px 16px",paddingBottom:"max(20px, env(safe-area-inset-bottom))"}}>
        <div style={{width:40,height:4,background:"rgba(255,255,255,0.15)",borderRadius:2,margin:"0 auto 16px"}}/>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:16,alignItems:"center"}}>
          <span style={{fontSize:15,fontWeight:700,color:"#f1f5f9"}}>{title}</span>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.08)",border:"none",color:"#94a3b8",fontSize:18,width:32,height:32,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── TX FORM ───────────────────────────────────────────────────────────
function TxForm({tx,onSave,onDelete}){
  const [f,setF]=useState({type:tx?.type||"SALE_CASH",amount:tx?.amount||"",narration:tx?.narration||"",billNo:tx?.billNo||"MAN-"+Date.now(),party:tx?.party||"",expenseAccount:tx?.expenseAccount||"MISC"});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const hasGST=f.amount&&["SALE_CASH","SALE_CREDIT","PURCHASE_CASH","PURCHASE_CREDIT"].includes(f.type);
  const inp={background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:"12px",color:"#e2e8f0",fontSize:15,width:"100%"};
  const lbl={fontSize:11,color:"#64748b",display:"block",marginBottom:5,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.8px"};
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div className="form-grid">
        <div><label style={lbl}>Transaction Type</label>
          <select value={f.type} onChange={e=>set("type",e.target.value)} style={inp}>
            {Object.entries(TYPE_LABELS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
          </select>
        </div>
        <div><label style={lbl}>Amount ₹ (excl. GST)</label>
          <input type="number" inputMode="decimal" value={f.amount} onChange={e=>set("amount",parseFloat(e.target.value)||"")} style={inp} placeholder="5000"/>
        </div>
        <div><label style={lbl}>Bill / Voucher No.</label>
          <input value={f.billNo} onChange={e=>set("billNo",e.target.value)} style={inp}/>
        </div>
        <div><label style={lbl}>Party Name</label>
          <input value={f.party} onChange={e=>set("party",e.target.value)} style={inp} placeholder="Customer / Vendor"/>
        </div>
      </div>
      {f.type==="EXPENSE"&&(<div><label style={lbl}>Expense Category</label>
        <select value={f.expenseAccount} onChange={e=>set("expenseAccount",e.target.value)} style={inp}>
          <option value="SALARY">Salary</option><option value="RENT">Rent</option><option value="MISC">Miscellaneous</option>
        </select>
      </div>)}
      <div><label style={lbl}>Narration / Description</label>
        <textarea value={f.narration} onChange={e=>set("narration",e.target.value)} rows={2} style={{...inp,resize:"none"}} placeholder="What was this for?"/>
      </div>
      {hasGST&&(<div style={{padding:"10px 14px",background:"rgba(245,158,11,0.08)",borderRadius:10,border:"1px solid rgba(245,158,11,0.2)",fontSize:13,color:"#fbbf24"}}>
        GST @18% = ₹{(f.amount*0.18).toFixed(2)} · Total = ₹{(f.amount*1.18).toFixed(2)}
      </div>)}
      <div style={{display:"flex",gap:10,justifyContent:"flex-end",paddingTop:4}}>
        {onDelete&&<button onClick={onDelete} style={{padding:"12px 16px",borderRadius:10,border:"1px solid rgba(244,63,94,0.4)",background:"rgba(244,63,94,0.1)",color:"#f87171",fontSize:14,fontWeight:600,flex:1}}>🗑 Delete</button>}
        <button onClick={()=>onSave(f)} disabled={!f.amount||!f.narration} style={{padding:"12px 20px",borderRadius:10,border:"none",background:!f.amount||!f.narration?"#1e293b":"linear-gradient(135deg,#f59e0b,#d97706)",color:!f.amount||!f.narration?"#475569":"#0a0f1e",fontSize:14,fontWeight:700,flex:2,cursor:!f.amount||!f.narration?"not-allowed":"pointer"}}>
          {tx?"Save Changes":"Post Transaction"}
        </button>
      </div>
    </div>
  );
}

// ── CSV IMPORT ────────────────────────────────────────────────────────
function CSVImport({onImport,onClose}){
  const [preview,setPreview]=useState([]);
  const [headers,setHeaders]=useState([]);
  const [rawRows,setRawRows]=useState([]);
  const [mapping,setMapping]=useState({type:"type",amount:"amount",narration:"narration",party:"party",billNo:"billno"});

  const handleFile=e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const lines=ev.target.result.trim().split("\n");
      const hdrs=lines[0].split(",").map(h=>h.trim().replace(/"/g,"").toLowerCase());
      setHeaders(hdrs);
      const rows=lines.slice(1).map(line=>{const vals=line.split(",").map(v=>v.trim().replace(/"/g,""));const obj={};hdrs.forEach((h,i)=>obj[h]=vals[i]||"");return obj;});
      setRawRows(rows); setPreview(rows.slice(0,3));
    };
    reader.readAsText(file);
  };

  const detectType=row=>{
    const t=(row[mapping.type]||"").toLowerCase();
    if(t.includes("sale")&&t.includes("credit")) return "SALE_CREDIT";
    if(t.includes("sale")) return "SALE_CASH";
    if(t.includes("purchase")&&t.includes("credit")) return "PURCHASE_CREDIT";
    if(t.includes("purchase")) return "PURCHASE_CASH";
    if(t.includes("expense")) return "EXPENSE";
    if(t.includes("receipt")) return "RECEIPT";
    if(t.includes("payment")) return "PAYMENT";
    return "SALE_CASH";
  };

  const doImport=()=>{
    const txs=rawRows.filter(r=>r[mapping.amount]).map(row=>makeTx({type:detectType(row),amount:parseFloat((row[mapping.amount]||"0").replace(/[₹,]/g,"")),narration:row[mapping.narration]||"Imported",party:row[mapping.party]||"—",billNo:row[mapping.billNo]||"CSV-"+Date.now()},"CSV"));
    onImport(txs); onClose();
  };

  const inp={background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,padding:"10px 12px",color:"#e2e8f0",fontSize:14,width:"100%"};
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{padding:12,background:"rgba(34,197,94,0.06)",borderRadius:10,border:"1px solid rgba(34,197,94,0.2)",fontSize:13,color:"#86efac",lineHeight:1.7}}>
        📋 Works with <strong>Vyapar, Tally, Busy, Marg, Zoho, QuickBooks</strong> — any app that exports CSV
      </div>
      <div style={{border:"2px dashed rgba(255,255,255,0.15)",borderRadius:12,padding:28,textAlign:"center",cursor:"pointer"}} onClick={()=>document.getElementById("csvf").click()}>
        <div style={{fontSize:36,marginBottom:8}}>📁</div>
        <div style={{color:"#94a3b8",fontSize:14,fontWeight:600}}>Tap to upload CSV</div>
        <div style={{color:"#475569",fontSize:12,marginTop:4}}>From Vyapar / Tally / Busy / Any billing app</div>
        <input id="csvf" type="file" accept=".csv,.txt" style={{display:"none"}} onChange={handleFile}/>
      </div>
      {headers.length>0&&(<>
        <div>
          <div style={{fontSize:12,fontWeight:700,color:"#fbbf24",marginBottom:8}}>Map your columns:</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {[["type","Transaction Type"],["amount","Amount"],["narration","Description"],["party","Party Name"],["billNo","Bill No."]].map(([key,label])=>(
              <div key={key}><label style={{fontSize:10,color:"#64748b",display:"block",marginBottom:3}}>{label}</label>
                <select value={mapping[key]} onChange={e=>setMapping(m=>({...m,[key]:e.target.value}))} style={{...inp,fontSize:12}}>
                  <option value="">— skip —</option>
                  {headers.map(h=><option key={h} value={h}>{h}</option>)}
                </select>
              </div>
            ))}
          </div>
        </div>
        <div style={{fontSize:12,color:"#64748b"}}>{rawRows.length} rows found in file</div>
        <button onClick={doImport} style={{padding:"14px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#22c55e,#16a34a)",color:"white",fontSize:14,fontWeight:700,cursor:"pointer"}}>✅ Import {rawRows.length} Transactions</button>
      </>)}
    </div>
  );
}

// ── AI BILL PARSER ────────────────────────────────────────────────────
function AIBillParser({onImport,onClose}){
  const [text,setText]=useState("");
  const [loading,setLoading]=useState(false);
  const [parsed,setParsed]=useState(null);
  const samples={
    WhatsApp:`Invoice #INV-2847 · Date: 01 Mar 2025\nBill To: Rajesh Kumar\nSamsung Galaxy A15 × 2 = ₹24,000\nGST @18% = ₹4,320\nTotal: ₹28,320\nPayment: Cash`,
    Email:`Purchase Invoice PUR-1122\nMobile Accessories Lot: ₹35,000\nGST: ₹6,300 · Total Due: ₹41,300\nPayment Terms: 30 days credit\nFrom: Raj Traders`,
    SMS:`VYAPAR: Cust: Priya Sharma, Inv: INV-9021, Amt: Rs.4500, GST: Rs.810, Total: Rs.5310, Cash Sale`
  };
  const parse=async()=>{
    setLoading(true); setParsed(null);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,messages:[{role:"user",content:`Extract bill details. Return ONLY JSON with: type (SALE_CASH/SALE_CREDIT/PURCHASE_CASH/PURCHASE_CREDIT/EXPENSE/RECEIPT/PAYMENT), amount (number excl GST), narration, party, billNo.\n\nText: ${text}`}]})});
      const data=await res.json();
      const raw=data.content?.map(b=>b.text||"").join("").replace(/```json|```/g,"").trim();
      setParsed(JSON.parse(raw));
    }catch{alert("Could not parse. Try again.");}
    setLoading(false);
  };
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{padding:12,background:"rgba(168,85,247,0.06)",borderRadius:10,border:"1px solid rgba(168,85,247,0.2)",fontSize:13,color:"#c4b5fd",lineHeight:1.7}}>
        🤖 <strong>Paste any bill</strong> — WhatsApp message, email, SMS, or describe it — AI reads and books it
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {Object.entries(samples).map(([k,v])=>(
          <button key={k} onClick={()=>setText(v)} style={{padding:"7px 12px",borderRadius:20,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(168,85,247,0.1)",color:"#c4b5fd",fontSize:12,cursor:"pointer"}}>
            {k} sample
          </button>

// ── TALLY XML ─────────────────────────────────────────────────────────
function TallyImport({onImport,onClose}){
  const [xmlText,setXmlText]=useState("");
  const [parsed,setParsed]=useState([]);
  const [done,setDone]=useState(false);
  const sample=`<ENVELOPE><BODY><IMPORTDATA><REQUESTDATA><TALLYMESSAGE>
  <VOUCHER>
    <DATE>20250301</DATE><VOUCHERTYPENAME>Sales</VOUCHERTYPENAME>
    <VOUCHERNUMBER>INV-001</VOUCHERNUMBER>
    <PARTYLEDGERNAME>Ramesh Traders</PARTYLEDGERNAME>
    <NARRATION>Sale of goods</NARRATION><AMOUNT>-15000</AMOUNT>
  </VOUCHER>
  <VOUCHER>
    <DATE>20250302</DATE><VOUCHERTYPENAME>Purchase</VOUCHERTYPENAME>
    <VOUCHERNUMBER>PUR-001</VOUCHERNUMBER>
    <PARTYLEDGERNAME>Supplier Co</PARTYLEDGERNAME>
    <NARRATION>Purchase of stock</NARRATION><AMOUNT>25000</AMOUNT>
  </VOUCHER>
</TALLYMESSAGE></REQUESTDATA></IMPORTDATA></BODY></ENVELOPE>`;
  const parse=()=>{
    try{
      const doc=new DOMParser().parseFromString(xmlText,"text/xml");
      const txs=[];
      doc.querySelectorAll("VOUCHER").forEach(v=>{
        const vt=(v.querySelector("VOUCHERTYPENAME")?.textContent||"").toLowerCase();
        let amt=0;
        v.querySelectorAll("AMOUNT").forEach(a=>{const n=Math.abs(parseFloat(a.textContent||"0"));if(n>amt)amt=n;});
        if(!amt) return;
        let type="SALE_CASH";
        if(vt.includes("sales")) type="SALE_CREDIT";
        else if(vt.includes("purchase")) type="PURCHASE_CREDIT";
        else if(vt.includes("receipt")) type="RECEIPT";
        else if(vt.includes("payment")) type="PAYMENT";
        txs.push({type,amount:amt,narration:v.querySelector("NARRATION")?.textContent||"Tally Import",party:v.querySelector("PARTYLEDGERNAME")?.textContent||"—",billNo:v.querySelector("VOUCHERNUMBER")?.textContent||"TLY-"+Date.now()});
      });
      setParsed(txs); setDone(true);
    }catch{alert("Invalid XML format.");}
  };
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{padding:12,background:"rgba(59,130,246,0.06)",borderRadius:10,border:"1px solid rgba(59,130,246,0.2)",fontSize:13,color:"#93c5fd",lineHeight:1.7}}>
        🏢 <strong>Tally Prime / ERP 9:</strong> Gateway → Display → Day Book → Export → XML, then paste below
      </div>
      {!done&&(<>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:12,color:"#64748b"}}>Paste Tally XML Export</span>
          <button onClick={()=>setXmlText(sample)} style={{fontSize:11,color:"#fbbf24",background:"none",border:"none",cursor:"pointer"}}>Load Sample</button>
        </div>
        <textarea value={xmlText} onChange={e=>setXmlText(e.target.value)} rows={7} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:12,color:"#86efac",fontSize:12,fontFamily:"monospace",resize:"none",width:"100%"}}/>
        <button onClick={parse} disabled={!xmlText.trim()} style={{padding:"14px",borderRadius:10,border:"none",background:xmlText.trim()?"linear-gradient(135deg,#3b82f6,#1d4ed8)":"#1e293b",color:"white",fontSize:14,fontWeight:700,cursor:xmlText.trim()?"pointer":"not-allowed"}}>
          🔍 Parse XML
        </button>
      </>)}
      {done&&(<>
        <div style={{padding:10,background:"rgba(34,197,94,0.08)",borderRadius:8,fontSize:13,color:"#86efac"}}>✅ Found {parsed.length} vouchers</div>
        <div style={{maxHeight:200,overflowY:"auto"}}>
          {parsed.map((t,i)=>(
            <div key={i} style={{padding:"10px 12px",borderBottom:"1px solid rgba(255,255,255,0.05)",display:"flex",justifyContent:"space-between",fontSize:13}}>
              <div>
                <div style={{color:"#e2e8f0",fontWeight:600}}>{t.narration}</div>
                <div style={{color:"#475569",fontSize:11,marginTop:2}}>{t.billNo} · {t.party}</div>
              </div>
              <span style={{color:"#fbbf24",fontFamily:"monospace",fontWeight:700,flexShrink:0,marginLeft:10}}>{fmt(t.amount)}</span>
            </div>
          ))}
        </div>
        <button onClick={()=>{onImport(parsed.map(b=>makeTx(b,"TALLY")));onClose();}} style={{padding:"14px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#22c55e,#16a34a)",color:"white",fontSize:14,fontWeight:700,cursor:"pointer"}}>
          ✅ Import All to AutoBooks
        </button>
      </>)}
    </div>
  );
}
